<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Real-Time Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-texture"></div>
    
    <header>
        <div class="container">
            <h1 class="gradient-text">AI INSIGHTS</h1>
            <p class="subtitle">Real-time Artificial Intelligence News from ETNews</p>
        </div>
    </header>

    <main class="container">
        <div id="news-grid" class="news-grid">
            <!-- News items will be injected here -->
            <div class="loader-container" id="loader">
                <div class="loader"></div>
                <p>Fetching latest AI news...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 AI Insights Dashboard. Data provided by ETNews.</p>
        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>
</html>
